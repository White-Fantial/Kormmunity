<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 820" role="img" aria-label="Kormmunity 앱 화면 미리보기">
  <defs>
    <filter id="phoneShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
    <filter id="bubbleShadow" x="-5%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="30" y="100" width="370" height="700" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Outer glow / background -->
  <rect x="10" y="90" width="410" height="720" rx="44" ry="44" fill="#fff8d6" opacity="0.6"/>

  <!-- Phone body -->
  <rect x="30" y="100" width="370" height="700" rx="36" ry="36" fill="white" filter="url(#phoneShadow)" stroke="#e8e0c8" stroke-width="1"/>

  <!-- Screen area (inner) -->
  <rect x="42" y="112" width="346" height="676" rx="28" ry="28" fill="white"/>

  <!-- Status bar -->
  <rect x="42" y="112" width="346" height="32" rx="0" ry="0" fill="white"/>
  <text x="70" y="133" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#333" font-weight="600">9:41</text>
  <!-- battery / signal icons placeholder -->
  <rect x="330" y="122" width="28" height="12" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="332" y="124" width="20" height="8" rx="1" fill="#333"/>
  <rect x="358" y="124" width="3" height="6" rx="1" fill="#333"/>
  <circle cx="316" cy="128" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="316" cy="128" r="2" fill="#333"/>
  <path d="M306 131 Q308 124 316 124 Q324 124 326 131" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M300 133 Q303 120 316 120 Q329 120 332 133" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Navigation bar -->
  <rect x="42" y="144" width="346" height="50" fill="white"/>
  <!-- Hamburger -->
  <rect x="66" y="161" width="20" height="2.5" rx="1.2" fill="#222"/>
  <rect x="66" y="168" width="20" height="2.5" rx="1.2" fill="#222"/>
  <rect x="66" y="175" width="20" height="2.5" rx="1.2" fill="#222"/>
  <!-- Logo: Kormmunity -->
  <text x="215" y="175" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#111" text-anchor="middle" letter-spacing="-0.5">K</text>
  <!-- speech bubble circle replacing 'o' -->
  <circle cx="233" cy="168" r="10" fill="#fee500"/>
  <ellipse cx="233" cy="168" rx="6" ry="5" fill="#222"/>
  <path d="M228 173 Q233 178 238 173" fill="#fee500"/>
  <text x="256" y="175" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#111">rmmunity</text>
  <!-- Bell icon -->
  <path d="M352 162 Q352 155 360 155 Q368 155 368 162 L370 171 Q372 174 360 175 Q348 174 350 171 Z" fill="none" stroke="#222" stroke-width="2"/>
  <path d="M357 175 Q360 179 363 175" fill="none" stroke="#222" stroke-width="2"/>

  <!-- Divider -->
  <line x1="42" y1="194" x2="388" y2="194" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="56" y="202" width="318" height="38" rx="10" ry="10" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="1"/>
  <text x="76" y="226" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#aaa">검색어를 입력하세요</text>
  <!-- Search icon -->
  <circle cx="352" cy="221" r="7" fill="none" stroke="#aaa" stroke-width="2"/>
  <line x1="357" y1="226" x2="363" y2="232" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>

  <!-- Section header -->
  <text x="60" y="262" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" font-weight="800" fill="#111">🔥 최신 인기글</text>

  <!-- ── Post Card 1: 기타 레슨 ── -->
  <rect x="56" y="274" width="318" height="72" rx="10" ry="10" fill="white" stroke="#efefef" stroke-width="1"/>
  <!-- thumbnail -->
  <rect x="64" y="282" width="56" height="56" rx="8" ry="8" fill="#e8d5b0"/>
  <text x="92" y="316" font-family="sans-serif" font-size="24" text-anchor="middle">🎸</text>
  <!-- text content -->
  <text x="132" y="298" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#0066cc" font-weight="600">오릴랜드</text>
  <text x="132" y="316" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="#111" font-weight="700">기타 레슨 (기타)</text>
  <text x="132" y="334" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#888">5분 전 · 👁 0 · ♡ 3</text>

  <!-- ── Post Card 2: 소파 ── -->
  <rect x="56" y="354" width="318" height="72" rx="10" ry="10" fill="white" stroke="#efefef" stroke-width="1"/>
  <rect x="64" y="362" width="56" height="56" rx="8" ry="8" fill="#e8ddd0"/>
  <text x="92" y="396" font-family="sans-serif" font-size="24" text-anchor="middle">🛋️</text>
  <text x="132" y="378" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#0066cc" font-weight="600">크라이스트처치</text>
  <text x="132" y="396" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="#111" font-weight="700">디자인 소파 팝니다</text>
  <text x="132" y="414" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#888">10분 전 · 👁 0 · ♡ 2</text>

  <!-- ── Post Card 3: 스팀청소기 ── -->
  <rect x="56" y="434" width="318" height="72" rx="10" ry="10" fill="white" stroke="#efefef" stroke-width="1"/>
  <rect x="64" y="442" width="56" height="56" rx="8" ry="8" fill="#d8d8d8"/>
  <text x="92" y="476" font-family="sans-serif" font-size="24" text-anchor="middle">🧹</text>
  <text x="132" y="458" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#0066cc" font-weight="600">웰링턴</text>
  <text x="132" y="476" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="#111" font-weight="700">스팀청소기 거의 새거</text>
  <text x="132" y="494" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#888">15분 전 · 👁 0 · ♡ 1</text>

  <!-- ── Post Card 4: 아이패드 ── -->
  <rect x="56" y="514" width="318" height="72" rx="10" ry="10" fill="white" stroke="#efefef" stroke-width="1"/>
  <rect x="64" y="522" width="56" height="56" rx="8" ry="8" fill="#c8d0e8"/>
  <text x="92" y="556" font-family="sans-serif" font-size="24" text-anchor="middle">📱</text>
  <text x="132" y="538" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#0066cc" font-weight="600">오릴랜드</text>
  <text x="132" y="556" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="#111" font-weight="700">아이패드 프로 11인치</text>
  <text x="132" y="574" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="11" fill="#888">20분 전 · 👁 0 · ♡ 4</text>
  <!-- 판매완료 badge -->
  <rect x="296" y="564" width="58" height="18" rx="4" ry="4" fill="none" stroke="#ff4444" stroke-width="1.2"/>
  <text x="325" y="577" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="10" fill="#ff4444" text-anchor="middle">판매완료</text>

  <!-- Bottom CTA button -->
  <rect x="56" y="624" width="318" height="50" rx="12" ry="12" fill="#fee500"/>
  <text x="215" y="656" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="18" font-weight="800" fill="#111" text-anchor="middle">글쓰기</text>

  <!-- Home indicator bar -->
  <rect x="178" y="782" width="74" height="4" rx="2" fill="#ccc"/>

  <!-- ── Speech bubble (KakaoTalk notification) ── -->
  <g filter="url(#bubbleShadow)">
    <!-- bubble body -->
    <rect x="110" y="20" width="250" height="68" rx="18" ry="18" fill="#fee500"/>
    <!-- bubble tail (pointing down-left) -->
    <polygon points="150,85 130,88 155,74" fill="#fee500"/>
    <!-- TALK logo circle -->
    <circle cx="138" cy="54" r="22" fill="#111"/>
    <!-- talk bubble icon inside circle -->
    <ellipse cx="138" cy="52" rx="12" ry="10" fill="#fee500"/>
    <polygon points="129,60 135,62 130,68" fill="#fee500"/>
    <text x="138" y="56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="900" fill="#111" text-anchor="middle">TALK</text>
    <!-- bubble text -->
    <text x="175" y="46" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" font-weight="800" fill="#111">카카오톡 알림으로</text>
    <text x="175" y="66" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" font-weight="800" fill="#111">더 빠르고 편리하게!</text>
  </g>
</svg>
